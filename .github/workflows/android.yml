name: Build Kivy APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install platform dependencies
      run: |
        sudo apt-get update
        # Install the autotools/libtool/tooling that autoreconf needs plus common build deps
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
          build-essential \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          pkg-config \
          m4 \
          gettext \
          bison \
          flex \
          nasm \
          zlib1g-dev \
          libsqlite3-dev \
          sqlite3 \
          bzip2 \
          libbz2-dev \
          libssl-dev \
          openssl \
          libgdbm-dev \
          libgdbm-compat-dev \
          liblzma-dev \
          libreadline-dev \
          libncursesw5-dev \
          libffi-dev \
          uuid-dev \
          tar \
          unzip \
          wget \
          openjdk-11-jdk-headless

        # quick debug so we can see tools are present in logs
        autoconf --version || true
        automake --version || true
        libtool --version || libtoolize --version || true
        pkg-config --version || true
        java -version || true

    - name: Install Buildozer and Dependencies
      run: |
        pip install --upgrade pip
        pip install Cython==0.29.33 buildozer python-for-android

    - name: Pre-setup Android SDK Manager for Buildozer
      env:
        JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
      run: |
        SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
        mkdir -p "$SDK_ROOT"/cmdline-tools
        mkdir -p "$SDK_ROOT"/licenses

        # Download and extract the commandline tools
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -q -O cmdline-tools.zip
        unzip -q cmdline-tools.zip -d "$SDK_ROOT"/cmdline-tools
        rm cmdline-tools.zip

        # The distribution places the tools under cmdline-tools/cmdline-tools; move to 'latest'
        if [ -d "$SDK_ROOT/cmdline-tools/cmdline-tools" ]; then
          mv "$SDK_ROOT/cmdline-tools/cmdline-tools" "$SDK_ROOT/cmdline-tools/latest" || true
        fi

        mkdir -p "$SDK_ROOT"/tools/bin
        ln -sf "$SDK_ROOT"/cmdline-tools/latest/bin/sdkmanager "$SDK_ROOT"/tools/bin/sdkmanager

        export ANDROID_SDK_ROOT="$SDK_ROOT"
        export ANDROID_HOME="$SDK_ROOT"
        export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$SDK_ROOT/tools/bin:$SDK_ROOT/platform-tools:$PATH"

        # Accept licenses (requires Java installed)
        yes | sdkmanager --sdk_root="$SDK_ROOT" --licenses || true

        # Install essential Android SDK components (pick versions that match your buildozer.spec android.api)
        sdkmanager --sdk_root="$SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2"

        # Verify aidl exists
        if [ -x "$SDK_ROOT/build-tools/33.0.2/aidl" ]; then
          echo "aidl found: $SDK_ROOT/build-tools/33.0.2/aidl"
        else
          echo "WARNING: aidl not found in build-tools; listing SDK_ROOT:"
          ls -la "$SDK_ROOT"
          ls -la "$SDK_ROOT"/build-tools || true
          exit 0
        fi

    - name: Build with Buildozer
      env:
        ANDROID_SDK_ROOT: ${{ github.workspace }}/.buildozer/android/platform/android-sdk
        ANDROID_HOME: ${{ github.workspace }}/.buildozer/android/platform/android-sdk
        JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
        PATH: ${{ github.workspace }}/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin:${HOME}/.buildozer/android/platform/android-sdk/platform-tools:${HOME}/.buildozer/android/platform/android-sdk/build-tools/33.0.2:$PATH
      run: |
        # Ensure buildozer uses the SDK we installed
        export ANDROID_SDK_ROOT=${HOME}/.buildozer/android/platform/android-sdk
        export ANDROID_HOME=${HOME}/.buildozer/android/platform/android-sdk
        export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
        export PATH=${HOME}/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin:${HOME}/.buildozer/android/platform/android-sdk/platform-tools:${HOME}/.buildozer/android/platform/android-sdk/build-tools/33.0.2:$PATH

        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Oxygen-Android-APK
        path: bin/*.apk
