name: Build Kivy APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install platform dependencies
      run: |
        sudo apt-get update
        # Install the autotools/libtool/tooling that autoreconf needs plus common build deps
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
          build-essential \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          pkg-config \
          m4 \
          gettext \
          bison \
          flex \
          nasm \
          zlib1g-dev \
          libsqlite3-dev \
          sqlite3 \
          bzip2 \
          libbz2-dev \
          libssl-dev \
          openssl \
          libgdbm-dev \
          libgdbm-compat-dev \
          liblzma-dev \
          libreadline-dev \
          libncursesw5-dev \
          libffi-dev \
          uuid-dev \
          tar \
          unzip \
          wget

        # quick debug so we can see tools are present in logs
        autoconf --version || true
        automake --version || true
        libtool --version || libtoolize --version || true
        pkg-config --version || true

    - name: Install Buildozer and Dependencies
      run: |
        pip install --upgrade pip
        pip install Cython==0.29.33 buildozer python-for-android

    - name: Pre-setup Android SDK Manager for Buildozer
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -q
        unzip -q commandlinetools-linux-9477386_latest.zip -d ~/.buildozer/android/platform/android-sdk/cmdline-tools
        rm commandlinetools-linux-9477386_latest.zip
        
        mv ~/.buildozer/android/platform/android-sdk/cmdline-tools/cmdline-tools ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
        
        mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
        ln -s ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        
        # (You may need to add license hashes for some SDK versions; keep what you had previously)
        echo -e "\n244ac7dc2b6901f85741a9d3329313b1e5021f56\n782327e505811d3b4610c3b3bc500e34dd3b95cd\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n9b20bde75b79bef17476568280459eed3103d558\ne9ac30d0b" > ~/.buildozer/android/platform/android-sdk/licenses/licenses.sha1 || true

    - name: Build with Buildozer
      env:
        ANDROID_NDK_HOME: ''
        ANDROID_NDK_ROOT: ''
      run: |
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Oxygen-Android-APK
        path: bin/*.apk
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Oxygen-Android-APK
        path: bin/*.apk
