name: Build Kivy APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install platform dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev sqlite3 bzip2 libbz2-dev libssl-dev openssl libgdbm-dev libgdbm-compat-dev liblzma-dev libreadline-dev libncursesw5-dev libffi-dev uuid-dev tar openjdk-17-jdk unzip autoconf libtool pkg-config zlib1g-dev

    - name: Install Buildozer and Dependencies
      run: |
        pip install --upgrade pip
        pip install Cython==0.29.33 buildozer python-for-android

    - name: Build with Buildozer
      # GitHub ke purane pre-installed NDK paths ko clear karke force build karwana
      env:
        ANDROID_NDK_HOME: ''
        ANDROID_NDK_ROOT: ''
      run: |
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Oxygen-Android-APK
        path: bin/*.apk
