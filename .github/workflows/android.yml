name: Build Kivy APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Keep a single canonical SDK path so all steps use the same location
      ANDROID_SDK_ROOT: /home/runner/.android/sdk
      ANDROID_HOME: /home/runner/.android/sdk
      JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64

    steps:
    - name: Install platform dependencies
      run: |
        sudo apt-get update
        # Install the autotools/libtool/tooling that autoreconf needs plus common build deps
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
          git \
          build-essential \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          pkg-config \
          m4 \
          gettext \
          bison \
          flex \
          nasm \
          zlib1g-dev \
          libsqlite3-dev \
          sqlite3 \
          bzip2 \
          libbz2-dev \
          libssl-dev \
          openssl \
          libgdbm-dev \
          libgdbm-compat-dev \
          liblzma-dev \
          libreadline-dev \
          libncursesw5-dev \
          libffi-dev \
          uuid-dev \
          tar \
          unzip \
          wget \
          openjdk-11-jdk-headless

        # quick debug so we can see tools are present in logs
        git --version || true
        autoconf --version || true
        automake --version || true
        libtool --version || libtoolize --version || true
        pkg-config --version || true
        java -version || true

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer and Dependencies
      run: |
        pip install --upgrade pip
        pip install Cython==0.29.33 buildozer python-for-android

    - name: Setup Android SDK
      run: |
        set -e
        SDK_ROOT="${ANDROID_SDK_ROOT}"
        mkdir -p "$SDK_ROOT"/{cmdline-tools,licenses,build-tools,platforms,ndk,cmake}

        echo "📥 Downloading Android CommandLine Tools..."
        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        rm commandlinetools-linux-9477386_latest.zip

        echo "📁 Setting up CommandLine Tools structure..."
        mkdir -p "$SDK_ROOT"/cmdline-tools/latest
        mv cmdline-tools/* "$SDK_ROOT"/cmdline-tools/latest/
        rm -rf cmdline-tools

        # Create symlink for backward compatibility
        mkdir -p "$SDK_ROOT"/tools/bin
        ln -sf "$SDK_ROOT"/cmdline-tools/latest/bin/sdkmanager "$SDK_ROOT"/tools/bin/sdkmanager || true

        # Make sure sdkmanager is executable
        chmod +x "$SDK_ROOT"/cmdline-tools/latest/bin/sdkmanager
        chmod +x "$SDK_ROOT"/cmdline-tools/latest/bin/avdmanager

        echo "✅ CommandLine Tools setup complete"
        ls -la "$SDK_ROOT"/cmdline-tools/latest/bin/sdkmanager

    - name: Accept Android Licenses
      run: |
        SDK_ROOT="${ANDROID_SDK_ROOT}"
        export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$PATH"
        
        echo "📋 Accepting Android SDK Licenses..."
        yes | sdkmanager --sdk_root="$SDK_ROOT" --licenses > /dev/null 2>&1 || true
        echo "✅ Licenses accepted"

    - name: Install Android SDK Components
      run: |
        set -e
        SDK_ROOT="${ANDROID_SDK_ROOT}"
        export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$PATH"

        echo "📦 Installing Android SDK Components..."
        sdkmanager --sdk_root="$SDK_ROOT" \
          "platform-tools" \
          "platforms;android-33" \
          "build-tools;33.0.2" \
          "ndk;21.4.7075529" \
          "cmake;3.10.2.4988404"

        echo "✅ SDK Components installed"

    - name: Verify Android SDK Installation
      run: |
        SDK_ROOT="${ANDROID_SDK_ROOT}"

        echo "🔍 Verifying SDK installation..."
        echo "SDK_ROOT: $SDK_ROOT"

        # Check critical tools
        if [ -f "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
          echo "✅ sdkmanager found"
        else
          echo "❌ sdkmanager NOT found"
          exit 1
        fi

        if [ -f "$SDK_ROOT/build-tools/33.0.2/aidl" ]; then
          echo "✅ aidl found"
          chmod +x "$SDK_ROOT/build-tools/33.0.2/aidl"
        else
          echo "❌ aidl NOT found"
          echo "Contents of build-tools:"
          ls -la "$SDK_ROOT/build-tools/" || true
          exit 1
        fi

        if [ -f "$SDK_ROOT/platform-tools/adb" ]; then
          echo "✅ adb found"
          chmod +x "$SDK_ROOT/platform-tools/adb"
        else
          echo "❌ adb NOT found"
          exit 1
        fi

        echo "✅ All critical tools verified!"

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = Oxygen
        package.name = oxygen
        package.domain = org.example.oxygen
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas
        version = 0.1

        [buildozer]
        log_level = 2
        warn_on_root = 1
        android.accept_sdk_license = True

        [app:permissions]
        android.permissions = INTERNET,ACCESS_NETWORK_STATE

        [buildozer:android]
        android.api = 33
        android.minapi = 21
        android.ndk = 21b
        android.arch = armeabi-v7a
        android.gradle_dependencies = 
        android.add_src = 
        android.entrypoint = org.kivy.android.PythonActivity
        android.logcat_filters = *:S python:D
        EOF
        echo "✅ buildozer.spec created"

    - name: Build with Buildozer
      run: |
        set -e
        
        # Set all required environment variables
        export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT}"
        export ANDROID_HOME="${ANDROID_SDK_ROOT}"
        export JAVA_HOME="/usr/lib/jvm/java-11-openjdk-amd64"
        export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/build-tools/33.0.2:$PATH"

        echo "🔧 Build Environment:"
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
        echo "ANDROID_HOME=$ANDROID_HOME"
        echo "JAVA_HOME=$JAVA_HOME"
        echo "PATH=$PATH"
        echo ""

        echo "🔍 Verifying tools before build..."
        which java && java -version
        which sdkmanager
        ls -la "$ANDROID_SDK_ROOT/build-tools/33.0.2/aidl" || exit 1

        echo ""
        echo "🏗️  Building APK with Buildozer..."
        buildozer -v android debug

    - name: Check Build Output
      if: always()
      run: |
        echo "📦 Checking build artifacts..."
        if [ -d "bin" ]; then
          ls -lah bin/ || true
        else
          echo "⚠️  bin/ directory not found"
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: Oxygen-Android-APK
        path: bin/*.apk
        retention-days: 30

    - name: Upload Build Logs on Failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: Build-Logs
        path: |
          .buildozer/android/platform/build-*/build/logs/*.txt
          .buildozer/logs/
